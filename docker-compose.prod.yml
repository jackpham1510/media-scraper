version: '3.9'

# Overlay for production resource limits.
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:
  api:
    mem_limit: 580m
    cpus: 1.0
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    environment:
      NODE_OPTIONS: '--max-old-space-size=480 --max-semi-space-size=64'
      UV_THREADPOOL_SIZE: 16

  mysql:
    mem_limit: 300m

  redis:
    mem_limit: 60m
